<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GA 14 | Special Election Benchmark Simulation</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --m: 'JetBrains Mono','SF Mono',monospace; --s: 'Instrument Sans','Helvetica Neue',sans-serif; }
html,body { height:100vh; overflow:hidden; background:#fafaf8; color:#222; font-family:var(--s); }
input[type=range] { -webkit-appearance:none; appearance:none; background:#e0e0e0; border-radius:3px; outline:none; height:3px; width:100%; cursor:pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:11px; height:11px; border-radius:50%; cursor:pointer; border:1.5px solid #fff; box-shadow:0 1px 2px rgba(0,0,0,0.15); }

.header { background:#fff; border-bottom:2px solid #e5e5e5; padding:6px 16px; flex-shrink:0; }
.header h1 { font-size:15px; font-weight:800; font-family:var(--m); display:inline; }
.header .date { font-size:8px; color:#aaa; font-family:var(--m); margin-left:10px; }

.grid { display:grid; grid-template-columns:220px 1fr 290px; flex:1; overflow:hidden; max-width:1100px; width:100%; margin:0 auto; }
.left { border-right:1px solid #eee; padding:6px; background:#fff; display:flex; flex-direction:column; gap:4px; overflow:hidden; }
.center { padding:6px 10px; overflow:hidden; display:flex; flex-direction:column; background:#fafaf8; }
.right { border-left:1px solid #eee; padding:5px 10px; background:#fff; overflow:hidden; display:flex; flex-direction:column; gap:4px; }

.box { background:#f8f8f6; border-radius:4px; padding:5px 8px; border:1px solid #eee; flex-shrink:0; }
.box-title { font-size:7px; font-weight:800; color:#555; font-family:var(--m); text-transform:uppercase; letter-spacing:0.05em; }
.box-row { display:flex; justify-content:space-between; margin-bottom:1px; font-size:7px; font-family:var(--m); }
.box-row .k { color:#999; } .box-row .v { font-weight:700; }

.slider-wrap { margin-bottom:6px; }
.slider-head { display:flex; justify-content:space-between; align-items:baseline; }
.slider-label { font-size:8px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:#888; font-family:var(--m); }
.slider-val { font-size:12px; font-weight:800; font-family:var(--m); }
.slider-sub { font-size:7px; color:#aaa; margin-bottom:1px; }
.slider-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

.outcome { border-radius:5px; padding:4px 10px; margin-bottom:5px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
.outcome-label { font-size:6px; color:#999; font-family:var(--m); text-transform:uppercase; letter-spacing:0.08em; font-weight:700; }
.outcome-text { font-size:12px; font-weight:800; font-family:var(--m); }
.outcome-votes { font-size:13px; font-weight:800; font-family:var(--m); color:#555; }
.outcome-pct { font-size:7px; color:#aaa; font-family:var(--m); }

.party-totals { display:grid; grid-template-columns:1fr 1fr; gap:4px; margin-bottom:5px; flex-shrink:0; }
.party-total { display:flex; align-items:center; justify-content:space-between; padding:3px 8px; border-radius:0 3px 3px 0; }
.party-total .label { font-size:8px; font-weight:700; font-family:var(--m); }
.party-total .pct { font-size:15px; font-weight:900; font-family:var(--m); }

.cand-list { background:#fff; border-radius:5px; border:1px solid #eee; padding:4px 6px; flex:1; overflow:hidden; }
.party-section { padding-left:5px; margin-bottom:2px; }
.party-section-label { font-size:6px; font-family:var(--m); font-weight:700; text-transform:uppercase; letter-spacing:0.08em; }
.cand-row { display:flex; align-items:center; gap:5px; padding:1.5px 0; border-bottom:1px solid #f5f5f5; }
.cand-rank { width:12px; font-size:8px; color:#ccc; font-family:var(--m); font-weight:700; text-align:center; }
.cand-info { flex:1; min-width:0; }
.cand-name-row { display:flex; align-items:center; gap:3px; margin-bottom:1px; }
.cand-name { font-size:10px; font-weight:700; color:#222; font-family:var(--s); }
.badge { font-size:5.5px; padding:0 2px; border-radius:1px; font-weight:800; font-family:var(--m); line-height:10px; }
.badge-trump { background:#fbbf24; color:#78350f; }
.badge-runoff { background:#22c55e; color:#fff; }
.cand-bar { height:10px; border-radius:2px; overflow:hidden; }
.cand-bar-fill { height:100%; border-radius:2px; transition:width 0.25s ease-out; }
.cand-pct { width:36px; text-align:right; font-size:11px; font-weight:800; font-family:var(--m); }
.cand-votes { width:40px; text-align:right; font-size:8px; color:#aaa; font-family:var(--m); }

.fund-row { display:flex; align-items:center; gap:3px; margin-bottom:1px; }
.fund-name { width:62px; font-size:6.5px; font-weight:600; color:#777; font-family:var(--s); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.fund-bar { flex:1; height:4px; background:#eee; border-radius:1px; overflow:hidden; }
.fund-bar-fill { height:100%; border-radius:1px; opacity:0.55; }
.fund-amt { width:32px; text-align:right; font-size:6.5px; font-family:var(--m); color:#888; font-weight:700; }

button.reset { width:100%; padding:3px 0; background:#fff; border:1px solid #ddd; border-radius:3px; color:#aaa; font-size:7px; font-family:var(--m); font-weight:700; cursor:pointer; text-transform:uppercase; letter-spacing:0.08em; flex-shrink:0; }

@media (max-width: 820px) {
  html, body { height:auto; overflow:auto; }
  body { display:flex; flex-direction:column; min-height:100vh; height:auto !important; }

  .header { padding:10px 14px; }
  .header h1 { font-size:13px; display:block; }
  .header .date { margin-left:0; display:block; margin-top:2px; }

  .grid { display:flex; flex-direction:column; flex:none; overflow:visible; padding:0 0 24px; }

  .left, .center, .right {
    border:none; overflow:visible; width:100%; padding:10px 12px;
  }
  .left { order:2; border-top:1px solid #eee; }
  .center { order:1; }
  .right { order:3; border-top:1px solid #eee; }

  .left svg { max-height:220px; }

  .box-title { font-size:8.5px; }
  .box-row { font-size:8.5px; padding:1px 0; }

  .slider-label { font-size:9px; }
  .slider-val { font-size:13px; }
  .slider-sub { font-size:8px; }
  input[type=range] { height:5px; }
  input[type=range]::-webkit-slider-thumb { width:18px; height:18px; }

  .outcome { padding:8px 12px; margin-bottom:8px; }
  .outcome-label { font-size:7.5px; }
  .outcome-text { font-size:13px; }
  .outcome-votes { font-size:14px; }
  .outcome-pct { font-size:8px; }

  .party-totals { margin-bottom:8px; }
  .party-total .label { font-size:9px; }
  .party-total .pct { font-size:16px; }

  .cand-list { overflow:visible; }
  .party-section-label { font-size:7.5px; }
  .cand-name { font-size:11px; }
  .cand-bar { height:12px; }
  .cand-pct { font-size:12px; width:42px; }
  .cand-votes { font-size:9px; width:46px; }
  .cand-rank { font-size:9px; }
  .badge { font-size:6.5px; padding:1px 3px; }

  .fund-name { font-size:8px; width:72px; }
  .fund-bar { height:6px; }
  .fund-amt { font-size:8px; }

  button.reset { padding:8px 0; font-size:9px; margin-top:4px; }
  .slider-grid { grid-template-columns:1fr; gap:6px; }
}
</style>
</head>
<body style="display:flex;flex-direction:column;height:100vh;">

<div class="header">
  <h1><span style="color:#c22">GA 14</span><span style="color:#ddd;margin:0 4px">|</span><span style="color:#333">SPECIAL ELECTION BENCHMARK SIMULATION</span></h1>

</div>

<div class="grid">
  <!-- LEFT -->
  <div class="left">
    <svg viewBox="0 0 300 400" style="width:100%;flex:1 1 0;min-height:0">
      <path d="M53.9,256.9 L69.8,350.2 L165.6,349.4 L165.3,378.4 L208.7,390.0 L251.2,385.7 L251.1,349.7 L272.6,351.8 L288.4,345.6 L288.4,341.3 L284.8,344.3 L283.7,337.6 L271.7,334.1 L276.2,331.6 L273.1,326.2 L281.6,315.3 L280.2,299.0 L275.2,295.1 L162.8,293.5 L163.4,252.6 L169.1,252.7 L171.4,238.6 L169.1,238.6 L169.3,210.8 L174.2,210.8 L174.1,196.6 L147.1,192.9 L146.3,189.3 L151.5,185.7 L144.9,174.8 L151.0,174.3 L151.0,149.8 L158.3,149.6 L159.1,124.6 L195.8,126.7 L200.8,120.9 L200.8,126.7 L234.5,129.0 L253.3,124.4 L253.8,130.0 L249.2,127.6 L249.2,132.0 L270.2,136.9 L269.5,91.2 L274.5,83.2 L273.8,76.0 L282.5,71.8 L290.0,61.1 L278.9,51.1 L279.3,10.0 L10.0,11.1 Z" fill="#fce4e4" stroke="#b91c1c" stroke-width="1.8" stroke-linejoin="round"/>
      <circle cx="183.8" cy="78.4" r="2.5" fill="#b91c1c" opacity="0.5"/><text x="189.8" y="81.9" fill="#777" font-size="8.5" font-family="var(--m)" font-weight="500">Dalton</text>
      <circle cx="189.1" cy="162.1" r="2.5" fill="#b91c1c" opacity="0.5"/><text x="195.1" y="165.6" fill="#777" font-size="8.5" font-family="var(--m)" font-weight="500">Calhoun</text>
      <circle cx="130.6" cy="239" r="2.5" fill="#b91c1c" opacity="0.5"/><text x="136.6" y="242.5" fill="#777" font-size="8.5" font-family="var(--m)" font-weight="500">Rome</text>

      <circle cx="264.1" cy="299" r="2.5" fill="#b91c1c" opacity="0.5"/><text x="270.1" y="302.5" fill="#777" font-size="8.5" font-family="var(--m)" font-weight="500">Acworth</text>
      <circle cx="98.5" cy="98.5" r="2.5" fill="#b91c1c" opacity="0.5"/><text x="104.5" y="102" fill="#777" font-size="8.5" font-family="var(--m)" font-weight="500">LaFayette</text>
      <circle cx="238.6" cy="79.5" r="2.5" fill="#b91c1c" opacity="0.5"/><text x="244.6" y="83" fill="#777" font-size="8.5" font-family="var(--m)" font-weight="500">Chatsworth</text>
      <circle cx="163.3" cy="318.7" r="2.5" fill="#b91c1c" opacity="0.5"/><text x="169.3" y="322.2" fill="#777" font-size="8.5" font-family="var(--m)" font-weight="500">Rockmart</text>
    </svg>
    <div class="box" id="baseline-box"></div>

  <!-- CENTER -->
  <div class="center">

  <!-- RIGHT -->
  <div class="right">
    <div class="box" id="env-box"></div>

    <button class="reset" onclick="resetAll()">Reset</button>

</div>

<script>
const CANDS = {
  dem: [
    {name:"Shawn Harris",party:"D",base:0.91,fund:4300000,trump:false},
    {name:"Jim Davis",party:"D",base:0.05,fund:12000},
    {name:"Jonathan Hobbs",party:"D",base:0.04,fund:8000},
  ],
  gop: [
    {name:"Clay Fuller",party:"R",base:0.22,fund:787000,trump:true},
    {name:"Colton Moore",party:"R",base:0.26,fund:320000},
    {name:"Nicky Lama",party:"R",base:0.13,fund:180000},
    {name:"Brian Stover",party:"R",base:0.12,fund:150000},
    {name:"Tom Gray",party:"R",base:0.09,fund:225526},
    {name:"Star Black",party:"R",base:0.05,fund:45000},
    {name:"Meg Strickland",party:"R",base:0.04,fund:30000},
    {name:"Other GOP (5)",party:"R",base:0.09,fund:60000,agg:true},
  ],
  other: [
    {name:"A. Underwood",party:"L",base:1,fund:5000},
    {name:"R. Ruszkowski",party:"I",base:1,fund:3000},
  ]
};
const REG=521000, DEM_BASE=Math.round(0.31*378000), GOP_BASE=Math.round(0.68*378000), OTHER_BASE=2000;
const D_RATIO=0.31/0.481, R_RATIO=0.68/0.507;

function autoTO(sp){ return {dem:Math.min(100,Math.max(5,45+sp*1.0)),gop:Math.min(100,Math.max(5,35-sp*0.7))}; }

let S={genD:52.6,genR:47.4,specials:7,demTO:52,gopTO:30,fundIntra:0.3,fundCross:0.03,trumpC:0.15};

function run(){
  const natT=S.genD+S.genR;
  let dD=(S.genD/natT)*D_RATIO, dR=(S.genR/natT)*R_RATIO, dO=0.012;
  const au=autoTO(S.specials), demDev=S.demTO-au.dem, gopDev=S.gopTO-au.gop;
  const effShift=S.specials+demDev*0.15-gopDev*0.15;
  dD+=effShift/100; dR-=effShift/100;
  dD=Math.max(0.01,dD); dR=Math.max(0.01,dR);
  const n=dD+dR+dO; dD/=n; dR/=n; dO/=n;
  const totalVotes=Math.round((S.demTO/100)*DEM_BASE+(S.gopTO/100)*GOP_BASE+OTHER_BASE);

  function alloc(cands,fw,isG){
    const tF=cands.reduce((s,c)=>s+c.fund,0);
    const m=cands.map(c=>{
      const ff=tF>0?c.fund/tF:1/cands.length;
      let sh=c.base*(1-fw)+ff*fw;
      if(isG&&S.trumpC>0){if(c.trump)sh+=(1-sh)*S.trumpC*0.6;else sh*=(1-S.trumpC*0.6);}
      return {...c,sh};
    });
    const t=m.reduce((s,c)=>s+c.sh,0);
    return m.map(c=>({...c,sh:c.sh/t}));
  }
  const dA=alloc(CANDS.dem,S.fundIntra,false), gA=alloc(CANDS.gop,S.fundIntra,true);
  const dRes=dA.map(c=>({...c,vs:c.sh*dD})), gRes=gA.map(c=>({...c,vs:c.sh*dR}));
  const all=[...dRes,...gRes], tAF=all.reduce((s,c)=>s+c.fund,0);
  const crossed=all.map(c=>{const adv=(c.fund/tAF)-(1/all.length);return{...c,vs:c.vs+adv*S.fundCross*0.008};});
  const oRes=[{...CANDS.other[0],vs:dO*0.6,party:"L"},{...CANDS.other[1],vs:dO*0.4,party:"I"}];
  let res=[...crossed,...oRes];
  const tS=res.reduce((s,c)=>s+c.vs,0);
  res=res.map(c=>{const vs=Math.max(0.001,c.vs/tS);return{...c,voteShare:vs,votes:Math.round(vs*totalVotes)};});
  const sorted=[...res].sort((a,b)=>b.voteShare-a.voteShare);
  const demTotal=res.filter(r=>r.party==="D").reduce((s,r)=>s+r.voteShare,0);
  const gopTotal=res.filter(r=>r.party==="R").reduce((s,r)=>s+r.voteShare,0);
  const leader=sorted[0], runoff=leader.voteShare<0.5, rp=runoff?[sorted[0],sorted[1]]:null;
  return{results:sorted,demTotal,gopTotal,totalVotes,turnoutPct:totalVotes/REG*100,runoff,rp,leader,effShift};
}

function fM(v){return v>0.05?`D+${v%1===0?v.toFixed(0):v.toFixed(1)}`:v<-0.05?`R+${Math.abs(v)%1===0?Math.abs(v).toFixed(0):Math.abs(v).toFixed(1)}`:"EVEN";}
function mC(v){return v>0.05?"#2563eb":v<-0.05?"#b91c1c":"#555";}
function loc(n){return n.toLocaleString();}
function esc(s){return s.replace(/</g,'&lt;');}

function slider(id,label,val,min,max,step,color,fmt,sub){
  const fv=fmt?fmt(val):val;
  return `<div class="slider-wrap">
    <div class="slider-head"><span class="slider-label">${label}</span><span class="slider-val" style="color:${color}">${fv}</span></div>
    ${sub?`<div class="slider-sub">${sub}</div>`:''}
    <input type="range" id="${id}" min="${min}" max="${max}" step="${step}" value="${val}" style="accent-color:${color};color:${color}">
  </div>`;
}

function render(){
  const m=run();
  const gm=S.genD-S.genR, au=autoTO(S.specials), demDev=S.demTO-au.dem, gopDev=S.gopTO-au.gop;
  const shiftAdj=m.effShift-S.specials, hasDev=Math.abs(demDev)>0.5||Math.abs(gopDev)>0.5;
  const combined=gm+m.effShift;
  const implD=((S.genD/(S.genD+S.genR))*D_RATIO*100).toFixed(1);
  const implR=((S.genR/(S.genD+S.genR))*R_RATIO*100).toFixed(1);
  const demVC=Math.round((S.demTO/100)*DEM_BASE), gopVC=Math.round((S.gopTO/100)*GOP_BASE);

  // Baseline box
  document.getElementById('baseline-box').innerHTML=[
    ["Cook PVI","R+19"],["2024 Trump / Biden","68 / 31"],["Registered","521,000"],
    ["Biden Base",loc(DEM_BASE)],["Trump Base",loc(GOP_BASE)]
  ].map(([k,v])=>`<div class="box-row"><span class="k">${k}</span><span class="v" style="color:#444">${v}</span></div>`).join('');

  // Settings box
  const rows=[
    ["Gen. Ballot",fM(gm),mC(gm),false],
    ["→ Dist. Baseline",`D ${implD} / R ${implR}`,"#555",false],
    ["Specials Base",fM(S.specials),"#16a34a",false],
  ];
  if(hasDev) rows.push(["Turnout Adj.",(shiftAdj>=0?"+":"")+shiftAdj.toFixed(1)+"pt",shiftAdj>=0?"#2563eb":"#b91c1c",false]);
  rows.push(["Eff. Shift",fM(m.effShift),mC(m.effShift),false]);
  rows.push(["Combined Env.",fM(combined),mC(combined),true]);
  rows.push(["D Turn.",`${S.demTO}% → ${loc(demVC)}`,"#2563eb",false]);
  rows.push(["R Turn.",`${S.gopTO}% → ${loc(gopVC)}`,"#b91c1c",false]);
  rows.push(["Total",`${loc(m.totalVotes)} (${m.turnoutPct.toFixed(1)}%)`,"#444",false]);
  document.getElementById('settings-box').innerHTML=rows.map(([k,v,c,bold])=>
    `<div class="box-row"><span class="k"${bold?' style="color:#444;font-weight:900"':''}>${k}</span><span class="v" style="color:${c};font-weight:${bold?900:700}">${v}</span></div>`
  ).join('');

  // Outcome
  const ob=document.getElementById('outcome-banner');
  const bg=m.runoff?"#f0fdf4":m.leader.party==="D"?"#eff6ff":"#fef2f2";
  const bc=m.runoff?"#22c55e":m.leader.party==="D"?"#2563eb":"#dc2626";
  let txt;
  if(m.runoff){
    const c0=m.rp[0].party==="D"?"#2563eb":"#b91c1c", c1=m.rp[1].party==="D"?"#2563eb":"#b91c1c";
    txt=`<span style="color:#16a34a">RUNOFF →</span> <span style="color:${c0}">${esc(m.rp[0].name)}</span><span style="color:#ccc"> vs </span><span style="color:${c1}">${esc(m.rp[1].name)}</span>`;
  } else {
    const c=m.leader.party==="D"?"#2563eb":"#b91c1c";
    txt=`<span style="color:${c}">${esc(m.leader.name)} WINS (${(m.leader.voteShare*100).toFixed(1)}%)</span>`;
  }
  ob.style.background=bg; ob.style.border=`2px solid ${bc}`;
  ob.innerHTML=`<div><div class="outcome-label">PROJECTED OUTCOME</div><div class="outcome-text">${txt}</div></div>
    <div style="text-align:right"><div class="outcome-votes">${loc(m.totalVotes)}</div><div class="outcome-pct">${m.turnoutPct.toFixed(1)}%</div></div>`;

  // Party totals
  document.getElementById('party-totals').innerHTML=`
    <div class="party-total" style="background:#eff6ff;border-left:3px solid #2563eb"><span class="label" style="color:#2563eb">DEM</span><span class="pct" style="color:#2563eb">${(m.demTotal*100).toFixed(1)}%</span></div>
    <div class="party-total" style="background:#fef2f2;border-left:3px solid #dc2626"><span class="label" style="color:#dc2626">GOP</span><span class="pct" style="color:#dc2626">${(m.gopTotal*100).toFixed(1)}%</span></div>`;

  // Candidates
  const mx=m.results[0]?.voteShare||0.5;
  const rn=m.rp?m.rp.map(c=>c.name):[];
  function candRow(c,rank){
    const pct=(c.voteShare*100).toFixed(1), bW=(c.voteShare/mx)*100;
    const pc=c.party==="D"?"#1a56a8":c.party==="R"?"#b91c1c":"#777";
    const bcl=c.party==="D"?"#2563eb":c.party==="R"?"#dc2626":"#999";
    const bgc=c.party==="D"?"#e8f0fe":c.party==="R"?"#fde8e8":"#f0f0f0";
    const badges=(c.trump?'<span class="badge badge-trump">TRUMP</span> ':'')+(rn.includes(c.name)?'<span class="badge badge-runoff">RUNOFF</span>':'');
    return `<div class="cand-row"><div class="cand-rank">${rank}</div><div class="cand-info">
      <div class="cand-name-row"><span class="cand-name">${esc(c.name)}</span>${badges}</div>
      <div class="cand-bar" style="background:${bgc}"><div class="cand-bar-fill" style="width:${bW}%;background:${bcl}"></div></div>
    </div><div class="cand-pct" style="color:${pc}">${pct}%</div><div class="cand-votes">${loc(c.votes)}</div></div>`;
  }
  const dems=m.results.filter(r=>r.party==="D"), gops=m.results.filter(r=>r.party==="R"), others=m.results.filter(r=>r.party!=="D"&&r.party!=="R");
  const grk=c=>m.results.findIndex(r=>r.name===c.name)+1;
  document.getElementById('cand-list').innerHTML=`
    <div class="party-section" style="border-left:2px solid #2563eb"><div class="party-section-label" style="color:#2563eb">DEMOCRATIC</div>${dems.map(c=>candRow(c,grk(c))).join('')}</div>
    <div class="party-section" style="border-left:2px solid #dc2626"><div class="party-section-label" style="color:#dc2626">REPUBLICAN</div>${gops.map(c=>candRow(c,grk(c))).join('')}</div>
    <div class="party-section" style="border-left:2px solid #999"><div class="party-section-label" style="color:#999">OTHER</div>${others.map(c=>candRow(c,grk(c))).join('')}</div>`;

  // RIGHT: ① Environment
  document.getElementById('env-box').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
      <span class="box-title">① NATIONAL ENVIRONMENT</span>
      <span style="font-size:14px;font-weight:900;font-family:var(--m);color:${mC(combined)}">${fM(combined)}</span>
    </div>
    <div style="font-size:6px;color:#aaa;font-family:var(--m);margin-bottom:3px;text-align:right">Ballot (${fM(gm)}) + Eff. Shift (${fM(m.effShift)})</div>
    <div class="slider-grid">
      ${slider('sl-genD','Dem %',S.genD,40,58,0.1,'#2563eb',v=>v.toFixed(1)+'%')}
      ${slider('sl-genR','GOP %',S.genR,40,58,0.1,'#dc2626',v=>v.toFixed(1)+'%')}
    </div>
    ${slider('sl-specials','Specials Shift',S.specials,-5,25,0.5,S.specials>0?'#16a34a':'#dc2626',v=>v>0?'D+'+v:v<0?'R+'+Math.abs(v):'EVEN','Sets base shift + auto-adjusts turnout')}`;

  // ② Turnout
  let devHtml='';
  if(hasDev) devHtml=`<div style="font-size:7px;color:${mC(shiftAdj)};font-family:var(--m);margin-bottom:3px;font-weight:700">Turnout deviation → shift ${shiftAdj>=0?'+':''}${shiftAdj.toFixed(1)}pt (effective: ${fM(m.effShift)})</div>`;
  document.getElementById('turnout-box').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
      <span class="box-title">② TURNOUT</span>
      <span style="font-size:10px;font-weight:800;font-family:var(--m);color:#444">${loc(m.totalVotes)}</span>
    </div>${devHtml}
    ${slider('sl-demTO','Dem Turnout',S.demTO,0,100,1,'#2563eb',v=>v+'%',`of ${loc(DEM_BASE)} Biden voters → ${loc(demVC)}`)}
    ${slider('sl-gopTO','GOP Turnout',S.gopTO,0,100,1,'#dc2626',v=>v+'%',`of ${loc(GOP_BASE)} Trump voters → ${loc(gopVC)}`)}`;

  // ③ Trump
  document.getElementById('trump-box').innerHTML=slider('sl-trumpC','③ Trump Consolidation',S.trumpC,0,1,0.05,'#d97706',v=>(v*100).toFixed(0)+'%','Consolidates GOP vote behind Fuller');

  // ④ Fundraising
  const allF=[...CANDS.dem,...CANDS.gop.filter(c=>!c.agg)].filter(c=>c.fund>10000).sort((a,b)=>b.fund-a.fund);
  const fundRows=allF.map(c=>{
    const w=(c.fund/4300000)*100, cl=c.party==="D"?"#2563eb":"#dc2626";
    const amt=c.fund>=1e6?'$'+(c.fund/1e6).toFixed(1)+'M':'$'+(c.fund/1e3).toFixed(0)+'K';
    return `<div class="fund-row"><div class="fund-name">${esc(c.name)}</div><div class="fund-bar"><div class="fund-bar-fill" style="width:${w}%;background:${cl}"></div></div><div class="fund-amt">${amt}</div></div>`;
  }).join('');
  document.getElementById('fund-box').innerHTML=`
    <div class="box-title" style="margin-bottom:2px">④ FUNDRAISING</div>${fundRows}
    <div class="slider-grid" style="margin-top:4px">
      ${slider('sl-fundIntra','Inside Party',S.fundIntra,0,1,0.05,'#b8860b',v=>(v*100).toFixed(0)+'%','$ within party')}
      ${slider('sl-fundCross','Outside Party',S.fundCross,0,0.1,0.005,'#92702b',v=>(v*100).toFixed(1)+'%','Cross-party')}
    </div>`;

  bindSliders();
}

function bindSliders(){
  const b=(id,key,parse)=>{const el=document.getElementById(id);if(el)el.oninput=e=>{S[key]=parse(e.target.value);render();}};
  b('sl-genD','genD',parseFloat);
  b('sl-genR','genR',parseFloat);
  const spEl=document.getElementById('sl-specials');
  if(spEl) spEl.oninput=e=>{
    S.specials=parseFloat(e.target.value);
    const a=autoTO(S.specials);
    S.demTO=Math.round(a.dem); S.gopTO=Math.round(a.gop);
    render();
  };
  b('sl-demTO','demTO',v=>parseInt(v));
  b('sl-gopTO','gopTO',v=>parseInt(v));
  b('sl-trumpC','trumpC',parseFloat);
  b('sl-fundIntra','fundIntra',parseFloat);
  b('sl-fundCross','fundCross',parseFloat);
}

function resetAll(){
  S={genD:52.6,genR:47.4,specials:7,demTO:52,gopTO:30,fundIntra:0.3,fundCross:0.03,trumpC:0.15};
  render();
}

render();
</script>
</body>
</html>
